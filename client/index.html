<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>GHCdb — Hockey Card Collection Tracker</title>
    <meta name="description" content="Track your hockey card collection. Log what you own, find what you're missing, and see stats by player, team, year, and set." />
    <meta name="application-name" content="GHCdb" />
    <meta name="theme-color" content="#6366f1" />

    <!-- Open Graph (Facebook, Discord, Slack, iMessage…) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="GHCdb" />
    <meta property="og:url" content="https://ghcdb.ca/" />
    <meta property="og:title" content="GHCdb — Hockey Card Collection Tracker" />
    <meta property="og:description" content="Track your hockey card collection. Log what you own, find what you're missing, and see stats by player, team, year, and set." />
    <meta property="og:image" content="https://ghcdb.ca/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_CA" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GHCdb — Hockey Card Collection Tracker" />
    <meta name="twitter:description" content="Track your hockey card collection. Log what you own, find what you're missing, and see stats by player, team, year, and set." />
    <meta name="twitter:image" content="https://ghcdb.ca/og-image.png" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://ghcdb.ca/" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/favicon/site.webmanifest" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
